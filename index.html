<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Carbon Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#121212;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow-x:hidden;
margin:0;
}

.glass-card{
background:#1a2236;
border:1px solid rgba(255,255,255,0.05);
transition:all .4s;
}

.glass-card:hover{
background:#1e2945;
transform:translateY(-8px);
border-color:rgba(99,102,241,.3);
box-shadow:0 25px 50px -12px rgba(0,0,0,.7);
}

.notification-center{
transition:.5s;
transform:translate(-50%,-50%) scale(.8);
opacity:0;
pointer-events:none;
}

.notification-center.active{
transform:translate(-50%,-50%) scale(1);
opacity:1;
pointer-events:auto;
}

.icon-box{
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
}

.ambient-glow{
position:absolute;
width:600px;
height:600px;
background:rgba(30,58,138,.15);
filter:blur(140px);
border-radius:50%;
z-index:-1;
}
</style>
</head>

<body class="p-6">

<div class="ambient-glow" style="top:-200px;left:-200px;"></div>
<div class="ambient-glow" style="bottom:-200px;right:-200px;"></div>

<div class="w-full max-w-5xl mx-auto">

<div class="text-center mb-16">
<h1 class="text-3xl md:text-5xl font-bold text-white">
Core <span class="text-blue-500">System</span>
</h1>
<p class="text-slate-500 mt-2 uppercase tracking-widest">Pusat Kendali Operasional</p>
</div>

<div class="grid grid-cols-2 lg:grid-cols-3 gap-5 md:gap-10">

<button onclick="handleAction('Utama','https://google.com')" class="glass-card group p-10 rounded-[2.5rem] text-center">
<i class="fas fa-chart-line text-2xl text-blue-400 mb-4"></i>
<h3 class="text-white font-bold">Analytics</h3>
</button>

<button onclick="handleAction('Finance','#restricted')" class="glass-card group p-10 rounded-[2.5rem] text-center">
<i class="fas fa-file-invoice-dollar text-2xl text-blue-400 mb-4"></i>
<h3 class="text-white font-bold">Revenue</h3>
</button>

<button onclick="handleAction('Project','https://notion.so')" class="glass-card group p-10 rounded-[2.5rem] text-center">
<i class="fas fa-sitemap text-2xl text-blue-400 mb-4"></i>
<h3 class="text-white font-bold">Projects</h3>
</button>

<button onclick="handleAction('Message','#maintenance')" class="glass-card group p-10 rounded-[2.5rem] text-center">
<i class="fas fa-envelope-open-text text-2xl text-blue-400 mb-4"></i>
<h3 class="text-white font-bold">Inbox</h3>
</button>

<button onclick="handleAction('Storage','#restricted')" class="glass-card group p-10 rounded-[2.5rem] text-center">
<i class="fas fa-database text-2xl text-blue-400 mb-4"></i>
<h3 class="text-white font-bold">Archives</h3>
</button>

<button onclick="handleAction('Admin','#maintenance')" class="glass-card group p-10 rounded-[2.5rem] text-center">
<i class="fas fa-user-shield text-2xl text-blue-400 mb-4"></i>
<h3 class="text-white font-bold">Security</h3>
</button>

</div>

</div>


<!-- POPUP -->
<div id="centralNotify" class="fixed top-1/2 left-1/2 notification-center z-[100] w-[90%] max-w-sm">
<div class="bg-[#1a2236] border border-white/10 p-10 rounded-[3rem] text-center">

<div id="notifyIconContainer" class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 border">
<i id="notifyIcon" class="fas fa-lock text-3xl"></i>
</div>

<h2 id="notifyTitle" class="text-2xl font-bold text-white mb-3"></h2>

<p id="notifyText" class="text-slate-400 text-sm mb-6"></p>

<div id="extraArea"></div>

<button id="closeBtn" onclick="closeNotify()" class="hidden w-full py-3 bg-white/10 rounded-xl">
Kembali
</button>

</div>
</div>


<script>

const accessKeys=[
"CORE-2026",
"FINANCE-ROOT",
"ARCHIVE-ACCESS",
"MASTER-KEY",
"SECURE-ADMIN"
]

let attempt=0
let maxAttempt=5
let targetLink="https://example.com"

function handleAction(name,url){

const notify=document.getElementById('centralNotify')
const title=document.getElementById('notifyTitle')
const text=document.getElementById('notifyText')
const icon=document.getElementById('notifyIcon')
const extra=document.getElementById('extraArea')
const close=document.getElementById('closeBtn')

notify.classList.add('active')
extra.innerHTML=""
close.classList.add("hidden")

if(url=="#maintenance"){

icon.className="fas fa-tools text-amber-500 text-3xl"
title.innerText="Sedang Maintenance"
text.innerText="Modul "+name+" sedang dalam pemeliharaan."
close.classList.remove("hidden")

}

else if(url=="#restricted"){

icon.className="fas fa-lock text-blue-400 text-3xl"
title.innerText="Security Authentication"
text.innerText="Masukkan Access Key untuk membuka modul "+name

extra.innerHTML=`

<input id="accessInput"
class="w-full p-3 bg-[#121212] border border-white/10 rounded-xl text-center text-white"
placeholder="Access Key">

<button onclick="verifyAccess()"
class="mt-4 w-full py-3 bg-blue-500 hover:bg-blue-600 rounded-xl font-bold">
Verify Access
</button>
`

close.classList.remove("hidden")

}

else{

icon.className="fas fa-check-circle text-emerald-500 text-3xl"
title.innerText="Mengakses "+name
text.innerText="Koneksi diverifikasi..."

setTimeout(()=>{

window.location.href=url

},1500)

}

}


function verifyAccess(){

const val=document.getElementById("accessInput").value
const text=document.getElementById("notifyText")

if(accessKeys.includes(val)){

document.getElementById("notifyTitle").innerText="Access Granted"
text.innerText="Kunci valid. Menghubungkan ke sistem..."

setTimeout(()=>{

window.location.href=targetLink

},1500)

}

else{

attempt++
text.innerText="Access Key salah ("+attempt+"/"+maxAttempt+")"

if(attempt>=maxAttempt){

text.innerText="Terlalu banyak percobaan. Akses diblokir."
document.getElementById("extraArea").innerHTML=""
}

}

}

function closeNotify(){

document.getElementById('centralNotify').classList.remove('active')

}

</script>

</body>
</html>
