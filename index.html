<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Core System</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#121212;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
color:white;
}

.card{
background:#1a2236;
border:1px solid rgba(255,255,255,0.05);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:#3b82f6;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.8);
opacity:0;
pointer-events:none;
transition:.4s;
}

.popup.active{
opacity:1;
pointer-events:auto;
transform:translate(-50%,-50%) scale(1);
}

</style>
</head>

<body class="p-6">

<div class="max-w-5xl w-full">

<div class="text-center mb-14">
<h1 class="text-4xl font-bold">Core <span class="text-blue-500">System</span></h1>
<p class="text-gray-400 mt-2">Operational Control Center</p>
</div>

<div class="grid grid-cols-2 lg:grid-cols-3 gap-6">

<button onclick="handleAction('Analytics','https://google.com')" class="card p-10 rounded-3xl text-center">
<i class="fas fa-chart-line text-3xl text-blue-400 mb-4"></i>
<h3 class="font-bold">Analytics</h3>
</button>

<button onclick="handleAction('Revenue','#restricted')" class="card p-10 rounded-3xl text-center">
<i class="fas fa-file-invoice-dollar text-3xl text-blue-400 mb-4"></i>
<h3 class="font-bold">Revenue</h3>
</button>

<button onclick="handleAction('Projects','https://notion.so')" class="card p-10 rounded-3xl text-center">
<i class="fas fa-sitemap text-3xl text-blue-400 mb-4"></i>
<h3 class="font-bold">Projects</h3>
</button>

<button onclick="handleAction('Inbox','#maintenance')" class="card p-10 rounded-3xl text-center">
<i class="fas fa-envelope-open-text text-3xl text-blue-400 mb-4"></i>
<h3 class="font-bold">Inbox</h3>
</button>

<button onclick="handleAction('Archives','#restricted')" class="card p-10 rounded-3xl text-center">
<i class="fas fa-database text-3xl text-blue-400 mb-4"></i>
<h3 class="font-bold">Archives</h3>
</button>

<button onclick="handleAction('Security','#maintenance')" class="card p-10 rounded-3xl text-center">
<i class="fas fa-user-shield text-3xl text-blue-400 mb-4"></i>
<h3 class="font-bold">Security</h3>
</button>

</div>

</div>

<!-- POPUP -->

<div id="popup" class="popup bg-[#1a2236] border border-white/10 p-10 rounded-3xl w-[90%] max-w-sm text-center">

<div id="popupIcon" class="text-4xl mb-4"></div>

<h2 id="popupTitle" class="text-xl font-bold mb-3"></h2>

<p id="popupText" class="text-gray-400 mb-6"></p>

<div id="popupInput"></div>

<button id="closeBtn" onclick="closePopup()" class="hidden w-full mt-4 py-3 bg-gray-700 rounded-xl">
Close
</button>

</div>


<script>

const keys=[
"CORE-2026",
"ADMIN-ROOT",
"FINANCE-ACCESS",
"ARCHIVE-KEY",
"SECURE-MASTER"
]

let tries=0
let maxTry=5
let redirectURL="https://example.com"

function handleAction(name,url){

const popup=document.getElementById("popup")
const icon=document.getElementById("popupIcon")
const title=document.getElementById("popupTitle")
const text=document.getElementById("popupText")
const input=document.getElementById("popupInput")
const close=document.getElementById("closeBtn")

popup.classList.add("active")
close.classList.add("hidden")
input.innerHTML=""

if(url=="#restricted"){

icon.innerHTML='<i class="fas fa-lock text-blue-400"></i>'
title.innerText="Security Authentication"
text.innerText="Masukkan Access Key untuk membuka modul "+name

input.innerHTML=`
<input id="keyInput"
class="w-full p-3 bg-black border border-white/10 rounded-lg text-center"
placeholder="Access Key">

<button onclick="verifyKey()"
class="w-full mt-4 py-3 bg-blue-500 rounded-lg font-bold">
Verify Access
</button>
`

}

else if(url=="#maintenance"){

icon.innerHTML='<i class="fas fa-tools text-yellow-500"></i>'
title.innerText="Maintenance"
text.innerText="Module "+name+" sedang maintenance"
close.classList.remove("hidden")

}

else{

window.location.href=url

}

}


function verifyKey(){

const val=document.getElementById("keyInput").value

const text=document.getElementById("popupText")

if(keys.includes(val)){

document.getElementById("popupTitle").innerText="Access Granted"
text.innerText="Kunci valid, menghubungkan ke sistem..."

setTimeout(()=>{

window.location.href=redirectURL

},1500)

}

else{

tries++

text.innerText="Access Key salah ("+tries+"/"+maxTry+")"

if(tries>=maxTry){

text.innerText="Terlalu banyak percobaan. Akses dikunci."
document.getElementById("popupInput").innerHTML=""
}

}

}

function closePopup(){

document.getElementById("popup").classList.remove("active")

}

</script>

</body>
</html>
